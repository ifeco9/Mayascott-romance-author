<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 130" width="360" height="130">
  <defs>
    <style>
      .ms { font-family: 'Georgia', 'Times New Roman', serif; font-weight: 900; }
      .sub { font-family: 'Arial', 'Helvetica', sans-serif; font-weight: 600; }
    </style>
  </defs>

  <!-- M letter -->
  <text x="100" y="80" font-size="95" fill="#1e6fa0" class="ms" text-anchor="middle">M</text>

  <!-- "maya" subscript -->
  <text x="102" y="115" font-size="11" fill="#1e6fa0" class="sub" text-anchor="middle" letter-spacing="5" opacity="0.5">MAYA</text>

  <!-- S letter -->
  <text x="260" y="80" font-size="95" fill="#1e6fa0" class="ms" text-anchor="middle">S</text>

  <!-- "scott" subscript -->
  <text x="258" y="115" font-size="11" fill="#1e6fa0" class="sub" text-anchor="middle" letter-spacing="5" opacity="0.5">SCOTT</text>

  <!-- Connecting heart -->
  <path d="M176,52 C176,50 179,48 180,48 C181,48 184,50 184,52 C184,55 180,57 180,57 C180,57 176,55 176,52 Z" fill="#d46a82" opacity="0.6"/>

  <!-- Decorative line -->
  <line x1="85" y1="126" x2="275" y2="126" stroke="#1e6fa0" stroke-width="0.8" opacity="0.15"/>
</svg>